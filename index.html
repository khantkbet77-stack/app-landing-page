<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKBET77 Official App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #0d381e 0%, #061c0e 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        .landing-box {
            background-color: #0b2416;
            border: 2px solid #d4af37;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 15px rgba(214, 175, 55, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            overflow: hidden;
            margin: 20px 0;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 2px solid #d4af37;
            background-color: #061c0e;
            min-height: 150px; /* ইমেজ লোড না হলেও স্পেস ধরে রাখবে */
        }

        .content {
            padding: 30px 20px;
        }

        .logo-container {
            margin-top: -60px;
        }

        .app-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            animation: floatAnimation 3s ease-in-out infinite;
        }

        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #d4af37;
            font-size: 32px;
            margin: 15px 0 5px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .bd-flag {
            font-size: 24px;
        }

        p {
            color: #b3cbbd;
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa8515 100%);
            color: #000000;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(214, 175, 55, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #ffffff 0%, #ffe066 50%, #d4af37 100%);
            box-shadow: 0 8px 25px rgba(214, 175, 55, 0.6);
            transform: translateY(-3px) scale(1.03);
        }

        .security-note {
            margin-top: 25px;
            font-size: 14px;
            color: #8fae9b;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        
        .security-note span {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="landing-box">
        <!-- ব্যানার ইমেজ লোড করার সহজ রুট লিঙ্ক -->
        <img src="./689702310_122094785019309345_4763763733411634234_n_3.jpg" alt="TKBET77 Banner" class="banner-img" onerror="this.src='689702310_122094785019309345_4763763733411634234_n_3.JPG'">
        
        <div class="content">
            <!-- লোগো ইমেজ লোড করার সহজ রুট লিঙ্ক -->
            <div class="logo-container">
                <img src="./icon_3.png" alt="TKBET77 Logo" class="app-logo" onerror="this.src='icon_3.PNG'">
            </div>

            <h1>TKBET77 <span class="bd-flag">🇧🇩</span></h1>
            
            <p>অফিশিয়াল অ্যান্ড্রয়েড অ্যাপটি ডাউনলোড করুন এবং লুফে নিন ২৫০% ফার্স্ট ডিপোজিট বোনাস!</p>
            
            <a href="https://github.com/khantkbet77-stack/TK77-apps/releases/download/tkbet77/tkbet77.1.apk" class="download-btn">Download APK</a>
            
            <div class="security-note">
                ✓ <span>১০০% নিরাপদ</span> এবং অফিশিয়াল ডাউনলোড লিংক
            </div>
        </div>
    </div>

</body>
</html>
