        body {
            margin: 0;

            /* ক্যাসিনো ডার্ক ব্যাকগ্রাউন্ড */
            background: linear-gradient(to bottom, #0a1911, #000000);

            color: white;

        .container {

            margin: 20px auto;

        }

        /* ব্যানার স্টাইল */
        .banner { 
            width: 100%; 
            border-bottom: 3px solid #ffd700; 
            display: block; 
            min-height: 180px;
            background-color: #05100a;
        }

        /* লোগো স্টাইল ও অ্যানিমেশন */
        .logo {

            height: 110px;

            border-radius: 50%; 
            border: 4px solid #ffd700;
            background: #000;
            box-shadow: 0 0 20px #ffd700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px #ffd700; }
            50% { transform: scale(1.08); box-shadow: 0 0 30px #ffea00; }
            100% { transform: scale(1); box-shadow: 0 0 15px #ffd700; }
        }

        .content { padding: 15px 20px; }

        .desc { 
            font-size: 16px; 
            color: #e0e0e0; 
            margin: 10px 0 20px 0; 
            line-height: 1.6;
        }

        /* ক্যাসিনো ইমোজি স্টাইল */
        .emojis { 
            font-size: 32px; 
            letter-spacing: 12px; 
            margin: 20px 0 30px 0; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* ডাউনলোড বাটন */
        .download-btn {
            display: block; 
            width: 85%; 
            margin: 0 auto;
            background: linear-gradient(to right, #ffdf00, #d4af37, #ffdf00);
            color: #000; 
            text-decoration: none;
            padding: 18px 0; 
            font-size: 22px; 
            font-weight: 800;
            border-radius: 30px; 
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.5);
            animation: bounce 2s infinite; 
            text-transform: uppercase;
        }

        .download-btn:hover {
            background: linear-gradient(to right, #ffffff, #ffdf00);
            transform: scale(1.05);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .safe-text {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
